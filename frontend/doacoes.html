<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Doações - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Doações</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Registrar Doação</h2>
      <form id="formDoacao">
        <input type="text" name="nomeDoador" placeholder="Nome do Doador" required>
        <input type="text" name="alimento" placeholder="Alimento" required>
        <input type="number" name="quantidade" placeholder="Quantidade" required>
        <input type="date" name="validade" required>
        <input type="text" name="localizacao" placeholder="Localização" required>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Doações</h2>
      <input type="text" id="pesquisaDoacoes" placeholder="Pesquisar por doador, alimento ou período">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Doações</h2>
      <ul id="listaDoacoes"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    function logout() {
      localStorage.removeItem("usuarioLogado");
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    // Pesquisa simples
    document.getElementById("pesquisaDoacoes")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      try {
        const res = await fetch(`${API_URL}/doacoes`);
        const doacoes = await res.json();

        const list = document.getElementById("listaDoacoes");
        list.innerHTML = "";

        doacoes.filter(d =>
          d.nomeDoador.toLowerCase().includes(termo) ||
          d.alimento.toLowerCase().includes(termo) ||
          (d.dataRegistro && d.dataRegistro.includes(termo))
        ).forEach(d => {
          const li = document.createElement("li");
          li.textContent = `${d.nomeDoador} | ${d.alimento} | ${d.quantidade} | ${d.localizacao}`;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Erro na pesquisa de doações", err);
      }
    });

    // Carregar lista ao abrir a página
    carregarLista("listaDoacoes", "doacoes");
  </script>
</body>
</html>
