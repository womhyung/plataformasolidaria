<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Doações - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Doações</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Registrar Doação</h2>
      <form id="formDoacao" onsubmit="cadastrarDoacao(event)">
        <input type="text" id="nomeDoador" placeholder="Nome do Doador" required>
        <input type="text" id="alimento" placeholder="Alimento" required>
        <input type="number" id="quantidade" placeholder="Quantidade" required>
        <input type="date" id="validade" required>
        <input type="text" id="localizacao" placeholder="Localização" required>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Doações</h2>
      <input type="text" id="pesquisaDoacoes" placeholder="Pesquisar por doador, alimento ou período">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Doações</h2>
      <ul id="listaDoacoes"></ul>
    </section>
  </main>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com"; // ajuste para o endereço real

    function logout() {
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    async function cadastrarDoacao(event) {
      event.preventDefault();
      const nomeDoador = document.getElementById("nomeDoador").value;
      const alimento = document.getElementById("alimento").value;
      const quantidade = document.getElementById("quantidade").value;
      const validade = document.getElementById("validade").value;
      const localizacao = document.getElementById("localizacao").value;

      try {
        const res = await fetch(`${API_URL}/doacoes`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nomeDoador, alimento, quantidade, validade, localizacao })
        });

        if (res.status === 201 || res.status === 200) {
          alert("Doação registrada com sucesso ✅");
          document.getElementById("formDoacao").reset();
          carregarDoacoes();
        } else {
          const erro = await res.json();
          alert(erro.message || "Erro ao cadastrar doação ❌");
        }
      } catch (err) {
        console.error("Erro ao cadastrar doação", err);
        alert("Erro ao cadastrar doação ❌");
      }
    }

    async function carregarDoacoes() {
      try {
        const res = await fetch(`${API_URL}/doacoes`);
        const doacoes = await res.json();

        const lista = document.getElementById("listaDoacoes");
        lista.innerHTML = "";

        doacoes.forEach(d => {
          const li = document.createElement("li");
          li.textContent = `${d.nomeDoador} | ${d.alimento} | ${d.quantidade} | ${d.localizacao}`;

          const btnEditar = document.createElement("button");
          btnEditar.textContent = "Editar";
          btnEditar.onclick = () => editarDoacao(d._id);

          const btnExcluir = document.createElement("button");
          btnExcluir.textContent = "Excluir";
          btnExcluir.onclick = () => excluirDoacao(d._id, li);

          li.appendChild(btnEditar);
          li.appendChild(btnExcluir);
          lista.appendChild(li);
        });
      } catch (err) {
        console.error("Erro ao carregar doações", err);
        alert("Erro ao carregar doações ❌");
      }
    }

    async function editarDoacao(id) {
      const novoAlimento = prompt("Digite o novo alimento:");
      const novaQuantidade = prompt("Digite a nova quantidade:");

      if (!novoAlimento || !novaQuantidade) return;

      try {
        const res = await fetch(`${API_URL}/doacoes/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ alimento: novoAlimento, quantidade: novaQuantidade })
        });

        if (res.status === 200) {
          alert("Doação atualizada com sucesso ✅");
          carregarDoacoes();
        } else {
          alert("Erro ao atualizar doação ❌");
        }
      } catch (err) {
        console.error("Erro ao editar doação", err);
        alert("Erro ao editar doação ❌");
      }
    }

    async function excluirDoacao(id, li) {
      if (!confirm("Tem certeza que deseja excluir esta doação?")) return;

      try {
        const res = await fetch(`${API_URL}/doacoes/${id}`, {
          method: "DELETE"
        });

        if (res.status === 200) {
          alert("Doação excluída com sucesso ✅");
          li.remove();
        } else {
          alert("Erro ao excluir doação ❌");
        }
      } catch (err) {
        console.error("Erro ao excluir doação", err);
        alert("Erro ao excluir doação ❌");
      }
    }

    // Pesquisa simples
    document.getElementById("pesquisaDoacoes")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      const res = await fetch(`${API_URL}/doacoes`);
      const doacoes = await res.json();

      const list = document.getElementById("listaDoacoes");
      list.innerHTML = "";

      doacoes.filter(d =>
        d.nomeDoador.toLowerCase().includes(termo) ||
        d.alimento.toLowerCase().includes(termo) ||
        (d.dataRegistro && d.dataRegistro.includes(termo))
      ).forEach(d => {
        const li = document.createElement("li");
        li.textContent = `${d.nomeDoador} | ${d.alimento} | ${d.quantidade} | ${d.localizacao}`;

        const btnEditar = document.createElement("button");
        btnEditar.textContent = "Editar";
        btnEditar.onclick = () => editarDoacao(d._id);

        const btnExcluir = document.createElement("button");
        btnExcluir.textContent = "Excluir";
        btnExcluir.onclick = () => excluirDoacao(d._id, li);

        li.appendChild(btnEditar);
        li.appendChild(btnExcluir);
        list.appendChild(li);
      });
    });

    // Carregar lista ao abrir a página
    carregarDoacoes();
  </script>
</body>
</html>
