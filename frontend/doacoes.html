<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Doações - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
  <h1>Gerenciar Doações</h1>

  <nav>
    <a href="admin.html">Admin</a>
    <a href="doacoes.html">Doações</a>
    <a href="instituicoes.html">Instituições</a>
    <a href="familias.html">Famílias</a>
    <a href="entregas.html">Entregas</a>
    <a href="avaliacoes.html">Avaliações</a>

    <input type="text" id="pesquisaDoacoes" placeholder="Buscar doação...">

    <button onclick="logout()">Sair</button>
  </nav>
</header>

<main>

  <!-- FORMULÁRIO -->
  <section>
    <h2 id="tituloForm">Registrar Doação</h2>

    <form id="formDoacao">
      <input type="hidden" name="nomeDoador" id="nomeDoador">

      <input type="text" name="alimento" placeholder="Alimento" required>
      <input type="number" name="quantidade" placeholder="Quantidade" required>
      <input type="date" name="validade" required>
      <input type="text" name="localizacao" placeholder="Localização" required>

      <select name="categoria" required>
        <option value="">Selecione a categoria</option>
        <option value="Grãos">Grãos</option>
        <option value="Hortaliças">Hortaliças</option>
        <option value="Enlatados">Enlatados</option>
      </select>

      <select name="status">
        <option value="pendente">Pendente</option>
        <option value="entregue">Entregue</option>
      </select>

      <button type="submit">Salvar</button>
      <button type="button" onclick="cancelarEdicao()">Cancelar</button>
    </form>
  </section>

  <!-- LISTA -->
  <section>
    <button onclick="carregarDoacoes()">Ver Doações</button>
    <ul id="listaDoacoes"></ul>
  </section>

</main>

<script>
const API_URL = "https://plataformasolidaria.onrender.com";

/* =========================
   AUTH
========================= */
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("usuarioLogado");
  alert("Logout realizado ✅");
  window.location.href = "login.html";
}

const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
document.getElementById("nomeDoador").value = usuario?.user?.nome || "";

/* =========================
   ESTADO GLOBAL (IMPORTANTE)
========================= */
let editandoId = null;

/* =========================
   LISTAGEM
========================= */
async function carregarDoacoes() {
  try {
    const res = await fetch(`${API_URL}/doacoes`);
    const doacoes = await res.json();

    const lista = document.getElementById("listaDoacoes");
    lista.innerHTML = "";

    doacoes.forEach(d => renderDoacao(d, lista));

  } catch (err) {
    console.error(err);
  }
}

/* =========================
   RENDER
========================= */
function renderDoacao(d, lista) {
  const li = document.createElement("li");

  li.textContent = `${d.nomeDoador} | ${d.alimento} | ${d.quantidade} | ${d.localizacao} | ${d.categoria} | ${d.status}`;

  const btnEditar = document.createElement("button");
  btnEditar.textContent = "Editar";
  btnEditar.onclick = () => iniciarEdicao(d);

  const btnExcluir = document.createElement("button");
  btnExcluir.textContent = "Excluir";
  btnExcluir.onclick = () => excluirDoacao(d._id);

  li.appendChild(btnEditar);
  li.appendChild(btnExcluir);

  lista.appendChild(li);
}

/* =========================
   CREATE / UPDATE (CRUD ÚNICO)
========================= */
document.getElementById("formDoacao").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const token = localStorage.getItem("token");

  const dados = {
    nomeDoador: form.elements["nomeDoador"].value,
    alimento: form.elements["alimento"].value,
    quantidade: form.elements["quantidade"].value,
    validade: form.elements["validade"].value,
    localizacao: form.elements["localizacao"].value,
    categoria: form.elements["categoria"].value,
    status: form.elements["status"].value
  };

  try {

    let url = `${API_URL}/doacoes`;
    let method = "POST";

    if (editandoId) {
      url = `${API_URL}/doacoes/${editandoId}`;
      method = "PUT";
    }

    const res = await fetch(url, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(dados)
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao salvar ❌");
      return;
    }

    alert(editandoId ? "Atualizado com sucesso ✅" : "Cadastrado com sucesso ✅");

    form.reset();
    editandoId = null;
    document.getElementById("tituloForm").textContent = "Registrar Doação";

    carregarDoacoes();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
});

/* =========================
   EDITAR
========================= */
async function iniciarEdicao(d) {
  editandoId = d._id;

  const form = document.getElementById("formDoacao");
  document.getElementById("tituloForm").textContent = "Editar Doação";

  form.elements["nomeDoador"].value = d.nomeDoador;
  form.elements["alimento"].value = d.alimento;
  form.elements["quantidade"].value = d.quantidade;
  form.elements["validade"].value = d.validade?.split("T")[0];
  form.elements["localizacao"].value = d.localizacao;
  form.elements["categoria"].value = d.categoria;
  form.elements["status"].value = d.status;
}

/* =========================
   CANCELAR EDIÇÃO
========================= */
function cancelarEdicao() {
  editandoId = null;

  const form = document.getElementById("formDoacao");
  form.reset();

  document.getElementById("tituloForm").textContent = "Registrar Doação";
}

/* =========================
   EXCLUIR
========================= */
async function excluirDoacao(id) {
  const token = localStorage.getItem("token");

  try {
    const res = await fetch(`${API_URL}/doacoes/${id}`, {
      method: "DELETE",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao excluir ❌");
      return;
    }

    alert("Excluído com sucesso ✅");
    carregarDoacoes();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
}

/* =========================
   PESQUISA
========================= */
document.getElementById("pesquisaDoacoes").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    buscarDoacoes(e.target.value);
  }
});

async function buscarDoacoes(termo) {
  try {
    const res = await fetch(`${API_URL}/doacoes`);
    const doacoes = await res.json();

    const lista = document.getElementById("listaDoacoes");
    lista.innerHTML = "";

    const t = termo.toLowerCase().trim();

    const filtradas = doacoes.filter(d =>
      (d.nomeDoador || "").toLowerCase().includes(t) ||
      (d.alimento || "").toLowerCase().includes(t) ||
      (d.localizacao || "").toLowerCase().includes(t) ||
      (d.categoria || "").toLowerCase().includes(t) ||
      (d.status || "").toLowerCase().includes(t)
    );

    filtradas.forEach(d => renderDoacao(d, lista));

  } catch (err) {
    console.error(err);
  }
}
</script>

</body>
</html>
