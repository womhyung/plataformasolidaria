<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Doações - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Doações</h1>
    <nav>
      <a href="admin.html">Admin</a>
      <a href="doacoes.html">Doações</a>
      <a href="instituicoes.html">Instituições</a>
      <a href="familias.html">Famílias</a>
      <a href="entregas.html">Entregas</a>
      <a href="avaliacoes.html">Avaliações</a>
      <input type="text" id="pesquisaDoacoes" placeholder="Buscar doação...">
      <a href="admin.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2 id="tituloForm">Registrar Doação</h2>
      <form id="formDoacao">
        <input type="hidden" name="nomeDoador" id="nomeDoador">
        <input type="text" name="alimento" placeholder="Alimento" required>
        <input type="number" name="quantidade" placeholder="Quantidade" required>
        <input type="date" name="validade" required>
        <input type="text" name="localizacao" placeholder="Localização" required>

        <select name="categoria" required>
          <option value="">Selecione a categoria</option>
          <option value="Grãos">Grãos</option>
          <option value="Hortaliças">Hortaliças</option>
          <option value="Enlatados">Enlatados</option>
        </select>

        <select name="status">
          <option value="pendente">Pendente</option>
          <option value="entregue">Entregue</option>
        </select>

        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Botão para exibir lista -->
    <section>
      <button onclick="carregarDoacoes()">Ver Doações</button>
      <ul id="listaDoacoes"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>

    function logout() {
      localStorage.removeItem("usuarioLogado");
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    // Preenche o campo oculto com o nome do usuário logado
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
  document.getElementById("nomeDoador").value = usuario?.user?.nome || "";

    // Pesquisa com Enter
    document.getElementById("pesquisaDoacoes").addEventListener("keypress", e => {
      if (e.key === "Enter") {
        buscarDoacoes(e.target.value);
      }
    });

    async function buscarDoacoes(termo) {
      try {
        const res = await fetch(`${API_URL}/doacoes`);
        const doacoes = await res.json();
        const lista = document.getElementById("listaDoacoes");
        lista.innerHTML = "";

        doacoes.filter(d =>
          d.nomeDoador.toLowerCase().includes(termo.toLowerCase()) ||
          d.alimento.toLowerCase().includes(termo.toLowerCase()) ||
          d.localizacao.toLowerCase().includes(termo.toLowerCase()) ||
          d.categoria.toLowerCase().includes(termo.toLowerCase()) ||
          d.status.toLowerCase().includes(termo.toLowerCase())
        ).forEach(d => renderDoacao(d, lista));
      } catch (err) {
        console.error("Erro na pesquisa de doações", err);
      }
    }

    async function carregarDoacoes() {
      try {
        const res = await fetch(`${API_URL}/doacoes`);
        const doacoes = await res.json();
        const lista = document.getElementById("listaDoacoes");
        lista.innerHTML = "";
        doacoes.forEach(d => renderDoacao(d, lista));
      } catch (err) {
        console.error("Erro ao carregar doações", err);
      }
    }

    function renderDoacao(d, lista) {
      const li = document.createElement("li");
      li.textContent = `${d.nomeDoador} | ${d.alimento} | ${d.quantidade} | ${d.localizacao} | ${d.categoria} | ${d.status}`;

      const btnEditar = document.createElement("button");
      btnEditar.textContent = "Editar";
      btnEditar.onclick = () => editarDoacao(d._id);

      const btnExcluir = document.createElement("button");
      btnExcluir.textContent = "Excluir";
      btnExcluir.onclick = () => excluirDoacao(d._id);

      li.appendChild(btnEditar);
      li.appendChild(btnExcluir);
      lista.appendChild(li);
    }

     // Função de edição
    async function editarDoacao(id) {
      try {
        const res = await fetch(`${API_URL}/doacoes/${id}`);
        if (!res.ok) throw new Error("Erro ao buscar doação");
        const doacao = await res.json();

        const form = document.getElementById("formDoacao");
         document.getElementById("tituloForm").textContent = "Editar Doação";
        form.elements["nomeDoador"].value = doacao.nomeDoador;
        form.elements["alimento"].value = doacao.alimento;
        form.elements["quantidade"].value = doacao.quantidade;
        form.elements["validade"].value = doacao.validade?.split("T")[0];
        form.elements["localizacao"].value = doacao.localizacao;
        form.elements["categoria"].value = doacao.categoria;
        form.elements["status"].value = doacao.status;

        // Alterar comportamento do submit para atualizar
        form.onsubmit = async (e) => {
          e.preventDefault();
          const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

          const dadosAtualizados = {
            nomeDoador: form.elements["nomeDoador"].value,
            alimento: form.elements["alimento"].value,
            quantidade: form.elements["quantidade"].value,
            validade: form.elements["validade"].value,
            localizacao: form.elements["localizacao"].value,
            categoria: form.elements["categoria"].value,
            status: form.elements["status"].value
          };

          const resUpdate = await fetch(`${API_URL}/doacoes/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${usuario?.token}`
            },
            body: JSON.stringify(dadosAtualizados)
          });

          if (resUpdate.ok) {
            alert("Doação atualizada com sucesso ✅");
            form.reset();
            carregarDoacoes();
            form.onsubmit = null; // restaura comportamento original
          } else {
            const erro = await resUpdate.json();
            alert("Erro ao atualizar doação ❌\n" + (erro.message || erro.error));
          }
        };
      } catch (err) {
        console.error("Erro ao editar doação:", err);
        alert("Não foi possível carregar os dados da doação ❌");
      }
    }

    async function excluirDoacao(id) {
      if (confirm("Deseja excluir esta doação?")) {
        await fetch(`${API_URL}/doacoes/${id}`, { method: "DELETE" });
        carregarDoacoes();
      }
    }
    // Captura o envio do formulário de doação
document.getElementById("formDoacao").addEventListener("submit", async (e) => {
  e.preventDefault(); // evita recarregar a página

  const form = e.target;
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));

  const dados = {
    nomeDoador: form.elements["nomeDoador"].value,
    alimento: form.elements["alimento"].value,
    quantidade: form.elements["quantidade"].value,
    validade: form.elements["validade"].value,
    localizacao: form.elements["localizacao"].value,
    categoria: form.elements["categoria"].value,
    status: form.elements["status"].value
  };

  try {
    const token = usuario?.token;
    const res = await fetch(`${API_URL}/doacoes`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(dados)
    });

     if (res.ok) {
      alert("Doação registrada com sucesso ✅");
      form.reset();
      carregarDoacoes();
    } else {
      const erro = await res.json();
      alert("Erro ao registrar doação ❌\n" + (erro.message || erro.error));
    }
  } catch (err) {
    console.error("Erro no cadastro de doação:", err);
  }
});
  </script>
</body>
</html>
