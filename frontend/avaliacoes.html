<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Avaliações - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Avaliações</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Enviar Avaliação</h2>
      <form id="formAvaliacao">
        <input type="text" name="instituicao" placeholder="Instituição" required>
        <textarea name="feedback" placeholder="Feedback" required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Avaliações</h2>
      <input type="text" id="pesquisaAvaliacoes" placeholder="Pesquisar por instituição ou feedback">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Avaliações</h2>
      <ul id="listaAvaliacoes"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    function logout() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "login.html";
    }

    // Pesquisa simples
    document.getElementById("pesquisaAvaliacoes")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      try {
        const res = await fetch(`${API_URL}/avaliacoes`);
        const avaliacoes = await res.json();

        const list = document.getElementById("listaAvaliacoes");
        list.innerHTML = "";

        avaliacoes.filter(a =>
          a.instituicao.toLowerCase().includes(termo) ||
          a.feedback.toLowerCase().includes(termo)
        ).forEach(a => {
          const li = document.createElement("li");
          li.textContent = `${a.instituicao} | ${a.feedback}`;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Erro na pesquisa de avaliações", err);
      }
    });

    // Carregar lista ao abrir a página
    carregarLista("listaAvaliacoes", "avaliacoes");
  </script>
</body>
</html>
