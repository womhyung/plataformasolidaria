<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Plataforma Solidária</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Estilo inspirado no Instagram */
    body {
      font-family: Arial, sans-serif;
      background-color: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: #fff;
      border: 1px solid #dbdbdb;
      padding: 40px;
      width: 350px;
      text-align: center;
      border-radius: 8px;
    }
    .login-container h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .login-container input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
    }
    .login-container button {
      width: 100%;
      padding: 10px;
      background-color: #0095f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-container button:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Plataforma Solidária</h1>
    <form id="formLogin">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = e.target.email.value.trim();
      const senha = e.target.senha.value.trim();

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Erro no login ❌");
          return;
        }

        // Salva token + dados do usuário
        const usuarioLogado = {
          token: data.token,
          id: data.user?.id,
          nome: data.user?.nome,
          role: data.user?.role
        };
        localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));

        // Redireciona conforme o tipo de usuário
        switch (usuarioLogado.role) {
          case "admin":
            window.location.href = "admin.html";
            break;
          case "ong":
            window.location.href = "ong.html";
            break;
          case "beneficiario":
            window.location.href = "beneficiario.html";
            break;
          case "doador":
            window.location.href = "doador.html";
            break;
          default:
            window.location.href = "perfil.html"; // fallback
        }
      } catch (err) {
        console.error("❌ Erro na requisição:", err);
        alert("Erro de conexão com o servidor");
      }
    });
  </script>
</body>
</html>
