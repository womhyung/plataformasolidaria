<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Plataforma Solidária</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      padding: 0;
    }
    nav {
      background-color: #fff;
      border-bottom: 1px solid #dbdbdb;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    nav h2 {
      margin: 0;
      font-size: 20px;
      color: #0095f6;
    }
    nav .links a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    nav .search-box input {
      padding: 6px;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
    }
    .login-container {
      background: #fff;
      border: 1px solid #dbdbdb;
      padding: 40px;
      width: 350px;
      text-align: center;
      border-radius: 8px;
      margin: 140px auto; /* espaço abaixo do navbar */
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .login-container h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    .login-container input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
    }
    .login-container button {
      width: 100%;
      padding: 10px;
      background-color: #0095f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-container button:hover {
      background-color: #0077cc;
    }
  </style>
</head>
<body>
  <!-- Navbar completo -->
  <nav>
    <h2>Plataforma Solidária</h2>
    <div class="links">
      <a href="doacoes.html">Doações</a>
      <a href="instituicoes.html">Instituições</a>
      <a href="entregas.html">Entregas</a>
      <a href="avaliacoes.html">Avaliações</a>
      <a href="perfil.html">Perfil</a>
      <a href="logout.html">Logout</a>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Pesquisar...">
    </div>
  </nav>

  <!-- Login -->
  <div class="login-container">
    <h1>Login</h1>
    <form id="formLogin">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    // Pesquisa com Enter
    document.getElementById("searchInput").addEventListener("keypress", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        alert("Pesquisar por: " + e.target.value);
        // Aqui você pode implementar a busca real
      }
    });

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = e.target.email.value.trim();
      const senha = e.target.senha.value.trim();

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Erro no login ❌");
          return;
        }

       // Salva tudo em um único objeto
        localStorage.setItem("usuarioLogado", JSON.stringify({
          nome: data.user.nome,
          role: data.user.role,
          id: data.user.id,
          token: data.token
        }));


        // Redireciona conforme o tipo de usuário
        switch (data.user.role) {
          case "admin":
            window.location.href = "admin.html";
            break;
          case "ong":
            window.location.href = "ong.html";
            break;
          case "beneficiario":
            window.location.href = "beneficiario.html";
            break;
          case "doador":
            window.location.href = "doador.html";
            break;
          default:
            window.location.href = "perfil.html"; // fallback
        }
      } catch (err) {
        console.error("❌ Erro na requisição:", err);
        alert("Erro de conexão com o servidor");
      }
    });
  </script>
</body>
</html>
