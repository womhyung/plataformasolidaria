<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Plataforma Solidária</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Login</h1>
  <form id="formLogin">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = e.target.email.value.trim();
      const senha = e.target.senha.value.trim();

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Erro no login ❌");
          return;
        }

        // Salva token + dados do usuário
        const usuarioLogado = {
          token: data.token,
          id: data.user?.id,
          nome: data.user?.nome,
          role: data.user?.role
        };
        localStorage.setItem("usuarioLogado", JSON.stringify(usuarioLogado));

        // Redireciona conforme o tipo de usuário
        if (usuarioLogado.role === "admin") {
          window.location.href = "admin.html";
        } else if (usuarioLogado.role === "ong") {
          window.location.href = "ong.html";
        } else if (usuarioLogado.role === "beneficiario") {
          window.location.href = "beneficiario.html";
        } else if (usuarioLogado.role === "doador") {
          window.location.href = "doador.html";
        } else {
          window.location.href = "perfil.html"; // fallback
        }
      } catch (err) {
        console.error("❌ Erro na requisição:", err);
        alert("Erro de conexão com o servidor");
      }
    });
  </script>
</body>
</html>
