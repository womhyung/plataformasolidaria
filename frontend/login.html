<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Plataforma Solidária</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Login</h1>
  <form onsubmit="login(event)">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="senha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <script>
    // Defina a URL da sua API (Render ou localhost)
    const API_URL = "https://plataformasolidaria.onrender.com"; // ajuste para o endereço real

    async function login(event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (res.status !== 200) {
          alert(data.message || "Erro no login ❌");
          return;
        }

        // Redireciona conforme o tipo de usuário
        if (data.role === "admin") {
          window.location.href = "admin.html";
        } else if (data.role === "ong") {
          window.location.href = "ong.html";
        } else {
          window.location.href = "perfil.html";
        }
      } catch (err) {
        console.error("❌ Erro na requisição:", err);
        alert("Erro de conexão com o servidor");
      }
    }
  </script>
</body>
</html>
