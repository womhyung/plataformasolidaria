<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Plataforma Solidária</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Login</h1>
  <form id="formLogin">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const senha = e.target.senha.value;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (res.status !== 200) {
          alert(data.message || "Erro no login ❌");
          return;
        }

        // Salva sessão do usuário
        localStorage.setItem("usuarioLogado", JSON.stringify(data));

        // Redireciona conforme o tipo de usuário
        if (data.role === "admin") {
          window.location.href = "admin.html";
        } else if (data.role === "ong") {
          window.location.href = "ong.html";
        } else if (data.role === "beneficiario") {
          window.location.href = "beneficiario.html";
        } else {
          window.location.href = "perfil.html";
        }
      } catch (err) {
        console.error("❌ Erro na requisição:", err);
        alert("Erro de conexão com o servidor");
      }
    });
  </script>
</body>
</html>
