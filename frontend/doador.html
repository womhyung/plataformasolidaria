<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Instagram Solidário</title>
  <link rel="stylesheet" href="doador.css">
</head>

<body>

<!-- HEADER FIXO -->
<header class="topbar">
  <div class="logo">FoodDonate</div>

  <input type="text" placeholder="Pesquisar...">

  <div class="top-actions">
    <button onclick="abrirDoacao()">＋</button>
    <button onclick="logout()">⎋</button>
  </div>
</header>

<main class="container">

  <!-- PERFIL -->
  <section class="profile">
    <img src="default-avatar.png" class="avatar">

    <div class="profile-info">
      <h2 id="nomeDoador">Doador</h2>
      <p id="bio">Fazendo o bem todos os dias 💛</p>
      <div id="contadorDoacoes">0 publicações</div>
    </div>
  </section>

  <!-- FEED -->
  <section class="feed" id="feedDoacoes"></section>

</main>

<!-- MODAL DOAÇÃO -->
<div id="modalDoacao" class="modal">
  <div class="modal-box">

    <h3>Nova Publicação</h3>

    <form id="formDoacao">
      <input type="text" name="alimento" placeholder="Alimento" required>
      <input type="number" name="quantidade" placeholder="Quantidade" required>
      <input type="text" name="validade" placeholder="Validade">
      <input type="text" name="localizacao" placeholder="Localização">

      <button type="submit">Publicar</button>
      <button type="button" onclick="fecharDoacao()">Cancelar</button>
    </form>

  </div>
</div>

<script src="doador.js"></script>
</body>
</html>
