<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perfil do Doador</title>
  <link rel="stylesheet" href="doador.css">
</head>

<body>

<div class="perfil">

  <!-- HEADER -->
  <div class="header">

    <img src="default-avatar.png" class="foto-perfil" id="fotoPerfil">

    <div class="info">
      <h2 id="nomeDoador">Carregando...</h2>
      <p id="bio">Carregando bio...</p>

      <span id="contadorDoacoes">0 doações</span>

      <div class="acoes">
        <button onclick="abrirFormularioDoacao()">Nova Doação</button>
        <button onclick="abrirFormularioEditarPerfil()">Editar Perfil</button>
        <button onclick="logout()">Sair</button>
      </div>
    </div>

  </div>

  <!-- FEED (Instagram style) -->
  <div class="feed" id="feedDoacoes">
    <p>Carregando doações...</p>
  </div>

</div>

<!-- MODAL DOAÇÃO -->
<div id="formNovaDoacao" class="modal" style="display:none;">
  <h3>Nova Doação</h3>

  <form id="novaDoacaoForm">

    <input type="text" name="alimento" placeholder="Alimento" required>
    <input type="number" name="quantidade" placeholder="Quantidade" required>
    <input type="text" name="validade" placeholder="Validade">
    <input type="text" name="localizacao" placeholder="Localização">

    <button type="submit">Salvar</button>
    <button type="button" onclick="fecharFormularioDoacao()">Cancelar</button>

  </form>
</div>

<!-- MODAL PERFIL -->
<div id="formEditarPerfil" class="modal" style="display:none;">
  <h3>Editar Perfil</h3>

  <form id="editarPerfilForm">

    <input type="text" id="editarNome" placeholder="Nome">
    <input type="text" id="editarBio" placeholder="Bio">
    <input type="text" id="editarFoto" placeholder="URL Foto">

    <button type="submit">Salvar</button>
    <button type="button" onclick="fecharFormularioEditarPerfil()">Cancelar</button>

  </form>
</div>

<script src="doador.js"></script>

</body>
</html>
