<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Entregas - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Entregas</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Registrar Entrega</h2>
      <form id="formEntrega">
        <input type="text" name="voluntario" placeholder="Voluntário Responsável" required>
        <input type="text" name="familiaDestino" placeholder="Família Destino" required>
        <input type="text" name="alimentoEntregue" placeholder="Alimento Entregue" required>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Entregas</h2>
      <input type="text" id="pesquisaEntregas" placeholder="Pesquisar por voluntário, família ou alimento">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Entregas</h2>
      <ul id="listaEntregas"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    function logout() {
      localStorage.removeItem("usuarioLogado");
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    // Pesquisa simples
    document.getElementById("pesquisaEntregas")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      try {
        const res = await fetch(`${API_URL}/entregas`);
        const entregas = await res.json();

        const list = document.getElementById("listaEntregas");
        list.innerHTML = "";

        entregas.filter(en =>
          en.voluntario.toLowerCase().includes(termo) ||
          en.familiaDestino.toLowerCase().includes(termo) ||
          en.alimentoEntregue.toLowerCase().includes(termo)
        ).forEach(en => {
          const li = document.createElement("li");
          li.textContent = `${en.voluntario} | ${en.familiaDestino} | ${en.alimentoEntregue}`;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Erro na pesquisa de entregas", err);
      }
    });

    // Carregar lista ao abrir a página
    carregarLista("listaEntregas", "entregas");
  </script>
</body>
</html>
