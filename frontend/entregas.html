<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Entregas - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Gerenciar Entregas</h1>

  <nav>
    <a href="perfil.html">Perfil</a>
    <button onclick="logout()">Sair</button>

    <input type="text" id="pesquisaEntregas" placeholder="Buscar entregas...">
  </nav>
</header>

<main>

  <!-- FORMULÁRIO -->
  <section>
    <h2 id="tituloForm">Registrar Entrega</h2>

    <form id="formEntrega">

      <!-- DOADOR (ANTES VOLUNTÁRIO) -->
      <select name="doador" id="doadorSelect" required>
        <option value="">Selecione o doador</option>
      </select>

      <!-- FAMÍLIA -->
      <select name="familiaDestino" id="familiaSelect" required>
        <option value="">Selecione a família</option>
      </select>

      <!-- ALIMENTO -->
      <select name="alimentoEntregue" id="alimentoSelect" required>
        <option value="">Selecione o alimento</option>
      </select>

      <!-- QUANTIDADE -->
      <input type="number" name="quantidade" placeholder="Quantidade entregue" required>

      <button type="submit">Salvar</button>
      <button type="button" onclick="cancelarEdicao()">Cancelar</button>

    </form>
  </section>

  <!-- LISTA -->
  <section>
    <button onclick="carregarEntregas()">Ver Entregas</button>
    <ul id="listaEntregas"></ul>
  </section>

</main>

<script>

const API_URL = "https://plataformasolidaria.onrender.com";

/* =========================
   AUTH
========================= */
function logout() {
  localStorage.removeItem("usuarioLogado");
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

/* =========================
   ESTADO
========================= */
let editandoId = null;

/* =========================
   TOKEN
========================= */
function getToken() {
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
  return usuario?.token;
}

/* =========================
   CARREGAR SELECTS (CORRIGIDO)
========================= */
async function carregarSelects() {
  try {

    const [familiasRes, doacoesRes, usuariosRes] = await Promise.all([
      fetch(`${API_URL}/familias`),
      fetch(`${API_URL}/doacoes`),
      fetch(`${API_URL}/usuarios`)
    ]);

    const familias = await familiasRes.json();
    const doacoes = await doacoesRes.json();
    const usuarios = await usuariosRes.json();

    const familiaSelect = document.getElementById("familiaSelect");
    const alimentoSelect = document.getElementById("alimentoSelect");
    const doadorSelect = document.getElementById("doadorSelect");

    familiaSelect.innerHTML = `<option value="">Selecione a família</option>`;
    alimentoSelect.innerHTML = `<option value="">Selecione o alimento</option>`;
    doadorSelect.innerHTML = `<option value="">Selecione o doador</option>`;

    familias.forEach(f => {
      if (f?.nomeFamilia) {
        familiaSelect.innerHTML += `<option value="${f.nomeFamilia}">${f.nomeFamilia}</option>`;
      }
    });

    doacoes.forEach(d => {
      if (d?.alimento) {
        alimentoSelect.innerHTML += `<option value="${d.alimento}">${d.alimento}</option>`;
      }
    });

    usuarios
      .filter(u => u.role === "doador")
      .forEach(u => {
        if (u?.nome) {
          doadorSelect.innerHTML += `<option value="${u.nome}">${u.nome}</option>`;
        }
      });

  } catch (err) {
    console.error("Erro ao carregar selects:", err);
  }
}

/* =========================
   LISTAR
========================= */
async function carregarEntregas() {
  try {
    const res = await fetch(`${API_URL}/entregas`);
    const data = await res.json();

    const lista = document.getElementById("listaEntregas");
    lista.innerHTML = "";

    data.forEach(e => renderEntrega(e, lista));

  } catch (err) {
    console.error("Erro ao carregar entregas:", err);
  }
}

/* =========================
   RENDER
========================= */
function renderEntrega(e, lista) {
  const li = document.createElement("li");

  li.textContent =
    `${e.doador} | ${e.familiaDestino} | ${e.alimentoEntregue} | ${e.quantidade}`;

  const btnEditar = document.createElement("button");
  btnEditar.textContent = "Editar";
  btnEditar.onclick = () => editarEntrega(e);

  const btnExcluir = document.createElement("button");
  btnExcluir.textContent = "Excluir";
  btnExcluir.onclick = () => excluirEntrega(e._id);

  li.appendChild(btnEditar);
  li.appendChild(btnExcluir);

  lista.appendChild(li);
}

/* =========================
   CREATE / UPDATE
========================= */
document.getElementById("formEntrega").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const token = getToken();

  const dados = {
    doador: form.elements["doador"].value,
    familiaDestino: form.elements["familiaDestino"].value,
    alimentoEntregue: form.elements["alimentoEntregue"].value,
    quantidade: form.elements["quantidade"].value
  };

  try {

    let url = `${API_URL}/entregas`;
    let method = "POST";

    if (editandoId) {
      url = `${API_URL}/entregas/${editandoId}`;
      method = "PUT";
    }

    const res = await fetch(url, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(dados)
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao salvar ❌");
      return;
    }

    alert(editandoId ? "Atualizado com sucesso ✅" : "Cadastrado com sucesso ✅");

    form.reset();
    editandoId = null;
    document.getElementById("tituloForm").textContent = "Registrar Entrega";

    carregarEntregas();

  } catch (err) {
    console.error(err);
  }
});

/* =========================
   EDITAR
========================= */
function editarEntrega(e) {
  editandoId = e._id;

  const form = document.getElementById("formEntrega");
  document.getElementById("tituloForm").textContent = "Editar Entrega";

  form.elements["doador"].value = e.doador || "";
  form.elements["familiaDestino"].value = e.familiaDestino || "";
  form.elements["alimentoEntregue"].value = e.alimentoEntregue || "";
  form.elements["quantidade"].value = e.quantidade || "";
}

/* =========================
   CANCELAR
========================= */
function cancelarEdicao() {
  editandoId = null;

  const form = document.getElementById("formEntrega");
  form.reset();

  document.getElementById("tituloForm").textContent = "Registrar Entrega";
}

/* =========================
   EXCLUIR
========================= */
async function excluirEntrega(id) {
  const token = getToken();

  try {
    const res = await fetch(`${API_URL}/entregas/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao excluir ❌");
      return;
    }

    alert("Excluído com sucesso ✅");
    carregarEntregas();

  } catch (err) {
    console.error(err);
  }
}

/* =========================
   BUSCA
========================= */
document.getElementById("pesquisaEntregas").addEventListener("input", async (e) => {

  const termo = e.target.value.toLowerCase().trim();

  try {
    const res = await fetch(`${API_URL}/entregas`);
    const data = await res.json();

    const filtradas = data.filter(e =>
      (e.doador || "").toLowerCase().includes(termo) ||
      (e.familiaDestino || "").toLowerCase().includes(termo) ||
      (e.alimentoEntregue || "").toLowerCase().includes(termo)
    );

    const lista = document.getElementById("listaEntregas");
    lista.innerHTML = "";

    filtradas.forEach(e => renderEntrega(e, lista));

  } catch (err) {
    console.error("Erro na busca:", err);
  }
});

/* =========================
   INIT
========================= */
carregarSelects();

</script>

</body>
</html>
