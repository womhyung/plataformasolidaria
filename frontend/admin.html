<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Administrativo - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Painel Administrativo</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Links de gerenciamento -->
    <section>
      <h2>Gerenciar Recursos</h2>
      <p>Selecione abaixo qual entidade deseja administrar:</p>
      <div class="admin-links">
        <a href="doacoes.html" class="btn">Doações</a>
        <a href="instituicoes.html" class="btn">Instituições</a>
        <a href="familias.html" class="btn">Famílias</a>
        <a href="entregas.html" class="btn">Entregas</a>
        <a href="avaliacoes.html" class="btn">Avaliações</a>
      </div>
    </section>

    <!-- Resumo geral -->
    <section>
      <h2>Resumo Geral</h2>
      <p>Visualize estatísticas consolidadas das operações:</p>
      <canvas id="graficoAdmin"></canvas>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    // Exibir gráfico geral no painel admin
    async function carregarResumoAdmin() {
      try {
        // Buscar dados de doações
        const resDoacoes = await fetch(`${API_URL}/doacoes`);
        const doacoes = await resDoacoes.json();

        // Buscar dados de entregas
        const resEntregas = await fetch(`${API_URL}/entregas`);
        const entregas = await resEntregas.json();

        // Buscar dados de famílias
        const resFamilias = await fetch(`${API_URL}/familias`);
        const familias = await resFamilias.json();

        // Buscar dados de instituições
        const resInstituicoes = await fetch(`${API_URL}/instituicoes`);
        const instituicoes = await resInstituicoes.json();

        // Consolidar estatísticas
        const dadosDoacoes = {};
        doacoes.forEach(d => {
          dadosDoacoes[d.alimento] = (dadosDoacoes[d.alimento] || 0) + d.quantidade;
        });

        const ctx = document.getElementById("graficoAdmin").getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels: [
              ...Object.keys(dadosDoacoes),
              "Entregas",
              "Famílias",
              "Instituições"
            ],
            datasets: [{
              label: "Resumo Geral",
              data: [
                ...Object.values(dadosDoacoes),
                entregas.length,
                familias.length,
                instituicoes.length
              ],
              backgroundColor: [
                "#9C27B0", "#673AB7", "#FF9800", "#607D8B", "#4CAF50", "#2196F3", "#E91E63"
              ]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              title: { display: true, text: "Estatísticas Consolidadas" }
            }
          }
        });
      } catch (err) {
        console.error("Erro ao carregar resumo admin", err);
      }
    }

    if (window.location.pathname.includes("admin.html")) {
      carregarResumoAdmin();
    }
  </script>
</body>
</html>
