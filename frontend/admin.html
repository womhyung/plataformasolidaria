<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Administrativo - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Painel Administrativo</h1>
    <nav>
      <a href="perfil.html" class="btn">Voltar ao Perfil</a>
      <button onclick="logout()" class="btn">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Links de gerenciamento -->
    <section>
      <h2>Gerenciar Recursos</h2>
      <div class="admin-links">
        <a href="doacoes.html" class="btn">Doações</a>
        <a href="instituicoes.html" class="btn">Instituições</a>
        <a href="familias.html" class="btn">Famílias</a>
        <a href="entregas.html" class="btn">Entregas</a>
        <a href="avaliacoes.html" class="btn">Avaliações</a>
      </div>
    </section>

    <!-- Cadastro de novos usuários -->
    <section>
      <h2>Cadastrar Novo Usuário</h2>
      <form id="formCadastroAdmin">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <select name="role" required>
          <option value="">Selecione o tipo</option>
          <option value="doador">Doador</option>
          <option value="ong">ONG</option>
          <option value="instituicao_parceira">Instituição Parceira</option>
          <option value="instituicao_receptora">Instituição Receptora</option>
          <option value="beneficiario">Beneficiário</option>
          <option value="admin">Administrador</option>
        </select>
        <button type="submit">Cadastrar Usuário</button>
      </form>
    </section>

     <!-- Resumo geral -->
    <section>
      <h2>Resumo Geral</h2>
      <p id="totalMes" style="font-weight:bold;"></p>
      <canvas id="graficoResumo"></canvas>
      <p id="fallbackResumo" style="color:gray;"></p>
    </section>

    <!-- Tipos de alimentos doados -->
    <section>
      <h2>Distribuição de Alimentos Doado</h2>
      <canvas id="graficoAlimentos"></canvas>
      <p id="fallbackAlimentos" style="color:gray;"></p>
    </section>
  </main>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";
    const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));

    function logout() {
      localStorage.removeItem("usuarioLogado");
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    // Cadastro de usuários pelo Admin
    document.getElementById("formCadastroAdmin")?.addEventListener("submit", async e => {
      e.preventDefault();
      const nome = e.target.nome.value.trim();
      const email = e.target.email.value.trim();
      const senha = e.target.senha.value.trim();
      const role = e.target.role.value;

      if (!nome || !email || !senha || !role) {
        alert("Preencha todos os campos corretamente ❌");
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": usuarioLogado?.token ? `Bearer ${usuarioLogado.token}` : ""
          },
          body: JSON.stringify({ nome, email, senha, role })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Usuário cadastrado com sucesso ✅");
          e.target.reset();
        } else {
          alert(data.message || data.error || data.detail || "Erro ao cadastrar usuário ❌");
        }
      } catch (err) {
        console.error("Erro no cadastro de usuário pelo admin:", err);
        alert("Erro de conexão com o servidor ❌");
      }
    });

    // Exibir gráficos no painel admin
    async function carregarResumoAdmin() {
      try {
        const res = await fetch(`${API_URL}/stats/doacoes`, {
          headers: { "Authorization": `Bearer ${usuarioLogado?.token}` }
        });
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("fallbackResumo").textContent = "Erro ao carregar estatísticas ❌";
          return;
        }

        // Exibe total do mês
        document.getElementById("totalMes").textContent =
          "Total de doações neste mês: " + data.totalMes;

        // Fallbacks
        if (data.porStatus.length === 0) {
          document.getElementById("fallbackResumo").textContent = "Nenhum dado de status disponível.";
        }
        if (data.porCategoria.length === 0) {
          document.getElementById("fallbackAlimentos").textContent = "Nenhum dado de categoria disponível.";
        }

        // Gráfico 1: Doações por status
        new Chart(document.getElementById("graficoResumo").getContext("2d"), {
          type: "bar",
          data: {
            labels: data.porStatus.map(s => s._id),
            datasets: [{
              label: "Doações por status",
              data: data.porStatus.map(s => s.total),
              backgroundColor: ["#9C27B0", "#FF9800", "#4CAF50", "#2196F3"]
            }]
          }
        });

        // Gráfico 2: Distribuição por categoria
        new Chart(document.getElementById("graficoAlimentos").getContext("2d"), {
          type: "pie",
          data: {
            labels: data.porCategoria.map(c => c._id),
            datasets: [{
              data: data.porCategoria.map(c => c.total),
              backgroundColor: ["#9C27B0", "#673AB7", "#FF9800", "#607D8B", "#4CAF50", "#2196F3", "#E91E63"]
            }]
          }
        });
      } catch (err) {
        console.error("Erro ao carregar resumo admin", err);
        document.getElementById("fallbackResumo").textContent = "Erro de conexão com o servidor ❌";
      }
    }

    carregarResumoAdmin();
  </script>
</body>
</html>
