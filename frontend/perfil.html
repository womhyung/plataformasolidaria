<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perfil - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>🌍 Plataforma Solidária</h1>
    <nav>
      <button onclick="showSection('perfilDoador')">Doador</button>
      <button onclick="showSection('perfilOng')">ONG</button>
      <button onclick="showSection('perfilInstituicaoParceira')">Instituição Parceira</button>
      <button onclick="showSection('perfilInstituicaoReceptora')">Instituição Receptora</button>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Perfil do Doador -->
    <section id="perfilDoador" class="active">
      <h2>Minhas Doações</h2>
      <ul id="listaDoacoesDoador">
        <li>Carregando suas doações...</li>
      </ul>
    </section>

    <!-- Perfil da ONG -->
    <section id="perfilOng" style="display:none;">
      <h2>Painel da ONG</h2>
      <h3>Doações Recebidas</h3>
      <ul id="listaDoacoesOng"></ul>
      <h3>Entregas Realizadas</h3>
      <ul id="listaEntregasOng"></ul>
      <h3>Filtros</h3>
      <input type="month" id="filtroOngMes">
      <button onclick="filtrarOng()">Pesquisar</button>
    </section>

    <!-- Perfil da Instituição Parceira -->
    <section id="perfilInstituicaoParceira" style="display:none;">
      <h2>Doações Realizadas</h2>
      <canvas id="graficoInstituicaoParceira"></canvas>
      <ul id="listaDoacoesInstituicaoParceira"></ul>
    </section>

    <!-- Perfil da Instituição Receptora -->
    <section id="perfilInstituicaoReceptora" style="display:none;">
      <h2>Feed da Instituição</h2>
      <div id="feedImagens"></div>
      <h3>Doações Recebidas</h3>
      <ul id="listaDoacoesInstituicaoReceptora"></ul>
    </section>
  </main>

  <script>
    // Verifica se há usuário logado
    const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
    if (!usuarioLogado) {
      alert("Você precisa estar logado para acessar o perfil ❌");
      window.location.href = "login.html";
    } else {
      // Se for admin, redireciona para admin.html
      if (usuarioLogado.role === "admin") {
        window.location.href = "admin.html";
      } else {
        // Mostra apenas a seção correspondente ao role
        showSection(`perfil${capitalize(usuarioLogado.role)}`);
      }
    }

    function showSection(sectionId) {
      document.querySelectorAll("main section").forEach(sec => sec.style.display = "none");
      const sec = document.getElementById(sectionId);
      if (sec) sec.style.display = "block";
    }

    function logout() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "login.html";
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }
  </script>
</body>
</html>
