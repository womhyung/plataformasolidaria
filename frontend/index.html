<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <h1>🌍 Plataforma Solidária</h1>
    <nav>
      <a href="#inicio" onclick="showSection('inicio')">Início</a>
      <a href="#login" onclick="showSection('login')">Login</a>
      <a href="#cadastro" onclick="showSection('cadastro')">Cadastro</a>
      <a href="#doacoes" onclick="showSection('doacoes')">Doações Públicas</a>
    </nav>
  </header>

  <main>
    <!-- Banner inicial -->
    <section id="inicio" class="active" style="text-align:center;">
      <h2>Bem-vindo à Plataforma Solidária</h2>
      <p>Conectando doadores, ONGs e beneficiários em um só lugar.</p>
      <div style="margin-top:1.5rem;">
        <button onclick="showSection('login')">Entrar</button>
        <button onclick="showSection('cadastro')">Cadastre-se</button>
      </div>
    </section>

    <!-- Login -->
    <section id="login" style="display:none;">
      <h2>Login</h2>
      <form id="formLogin">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>
      <p>Não possui conta? <a href="#cadastro" onclick="showSection('cadastro')">Cadastre-se aqui</a></p>
    </section>

    <!-- Cadastro -->
    <section id="cadastro" style="display:none;">
      <h2>Cadastro</h2>
      <form id="formCadastro">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <select name="role" required>
          <option value="">Selecione o tipo</option>
          <option value="doador">Doador</option>
          <option value="ong">ONG</option>
          <option value="instituicao_parceira">Instituição Parceira</option>
          <option value="instituicao_receptora">Instituição Receptora</option>
          <option value="beneficiario">Beneficiário</option>
          <option value="admin">Administrador</option>
        </select>
        <button type="submit">Cadastrar</button>
      </form>
      <p>Já possui conta? <a href="#login" onclick="showSection('login')">Faça login</a></p>
    </section>

    <!-- Doações públicas -->
    <section id="doacoes" style="display:none;">
      <h2>Lista de Doações Públicas</h2>
      <ul id="listaDoacoes">
        <li>Carregando doações...</li>
      </ul>
    </section>
  </main>

  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    function showSection(sectionId) {
      document.querySelectorAll("main section").forEach(sec => sec.style.display = "none");
      document.getElementById(sectionId).style.display = "block";
    }

    // Login
    document.getElementById("formLogin")?.addEventListener("submit", async e => {
      e.preventDefault();
      const email = e.target.email.value;
      const senha = e.target.senha.value;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.message || "Erro no login ❌");
          return;
        }

        localStorage.setItem("usuarioLogado", JSON.stringify(data));

        if (data.role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "perfil.html";
        }
      } catch (err) {
        console.error("Erro no login", err);
        alert("Erro de conexão com o servidor ❌");
      }
    });

    // Cadastro
    document.getElementById("formCadastro")?.addEventListener("submit", async e => {
      e.preventDefault();
      const nome = e.target.nome.value;
      const email = e.target.email.value;
      const senha = e.target.senha.value;
      const role = e.target.role.value;

      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, senha, role })
        });

        if (res.ok) {
          alert("Cadastro realizado com sucesso ✅");
          e.target.reset();
          showSection("login");
        } else {
          const erro = await res.json();
          alert(erro.message || "Erro no cadastro ❌");
        }
      } catch (err) {
        console.error("Erro no cadastro", err);
        alert("Erro de conexão com o servidor ❌");
      }
    });

    // Doações públicas
    async function carregarDoacoesPublicas() {
      try {
        const res = await fetch(`${API_URL}/doacoes`);
        const doacoes = await res.json();

        const lista = document.getElementById("listaDoacoes");
        lista.innerHTML = "";

        if (doacoes.length === 0) {
          lista.innerHTML = "<li>Nenhuma doação encontrada.</li>";
          return;
        }

        doacoes.forEach(d => {
          const li = document.createElement("li");
          li.textContent = `${d.alimento} - ${d.quantidade}`;
          lista.appendChild(li);
        });
      } catch (err) {
        console.error("Erro ao carregar doações públicas", err);
        document.getElementById("listaDoacoes").innerHTML = "<li>Erro ao carregar doações ❌</li>";
      }
    }

    carregarDoacoesPublicas();
  </script>
</body>
</html>
