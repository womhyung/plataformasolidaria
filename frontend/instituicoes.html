<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Instituições - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Gerenciar Instituições</h1>

  <nav>
    <a href="perfil.html">Perfil</a>
    <button onclick="logout()">Sair</button>

    <input type="text" id="pesquisaInstituicoes" placeholder="Buscar instituições...">
  </nav>
</header>

<main>

  <!-- FORMULÁRIO -->
  <section>
    <h2 id="tituloForm">Cadastrar Instituição</h2>

    <form id="formInstituicao">
      <input type="text" name="nomeInstituicao" placeholder="Nome da Instituição" required>
      <input type="text" name="endereco" placeholder="Endereço" required>

      <button type="submit">Salvar</button>
      <button type="button" onclick="cancelarEdicao()">Cancelar</button>
    </form>
  </section>

  <!-- LISTA -->
  <section>
    <button onclick="carregarInstituicoes()">Ver Instituições</button>
    <ul id="listaInstituicoes"></ul>
  </section>

</main>

<script>

const API_URL = "https://plataformasolidaria.onrender.com";

/* =========================
   AUTH
========================= */
function logout() {
  localStorage.removeItem("usuarioLogado");
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

/* =========================
   ESTADO GLOBAL
========================= */
let editandoId = null;

/* =========================
   TOKEN PADRÃO
========================= */
function getToken() {
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
  return usuario?.token;
}

/* =========================
   LISTAR
========================= */
async function carregarInstituicoes() {
  try {
    const res = await fetch(`${API_URL}/instituicoes`);

    if (!res.ok) throw new Error("Erro ao buscar instituições");

    const data = await res.json();

    const lista = document.getElementById("listaInstituicoes");
    lista.innerHTML = "";

    if (!data.length) {
      lista.innerHTML = "<li>Nenhuma instituição cadastrada</li>";
      return;
    }

    data.forEach(i => renderInstituicao(i, lista));

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar instituições ❌");
  }
}

/* =========================
   RENDER
========================= */
function renderInstituicao(i, lista) {
  const li = document.createElement("li");

  li.textContent = `${i.nomeInstituicao} | ${i.endereco}`;

  const btnEditar = document.createElement("button");
  btnEditar.textContent = "Editar";
  btnEditar.onclick = () => editarInstituicao(i);

  const btnExcluir = document.createElement("button");
  btnExcluir.textContent = "Excluir";
  btnExcluir.onclick = () => excluirInstituicao(i._id);

  li.appendChild(btnEditar);
  li.appendChild(btnExcluir);

  lista.appendChild(li);
}

/* =========================
   CREATE / UPDATE
========================= */
document.getElementById("formInstituicao").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const token = getToken();

  const dados = {
    nomeInstituicao: form.elements["nomeInstituicao"].value,
    endereco: form.elements["endereco"].value
  };

  try {

    let url = `${API_URL}/instituicoes`;
    let method = "POST";

    if (editandoId) {
      url = `${API_URL}/instituicoes/${editandoId}`;
      method = "PUT";
    }

    const res = await fetch(url, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(dados)
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao salvar ❌");
      return;
    }

    alert(editandoId ? "Atualizado com sucesso ✅" : "Cadastrado com sucesso ✅");

    form.reset();
    editandoId = null;
    document.getElementById("tituloForm").textContent = "Cadastrar Instituição";

    carregarInstituicoes();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
});

/* =========================
   EDITAR
========================= */
function editarInstituicao(i) {
  editandoId = i._id;

  const form = document.getElementById("formInstituicao");
  document.getElementById("tituloForm").textContent = "Editar Instituição";

  form.elements["nomeInstituicao"].value = i.nomeInstituicao || "";
  form.elements["endereco"].value = i.endereco || "";
}

/* =========================
   CANCELAR
========================= */
function cancelarEdicao() {
  editandoId = null;

  const form = document.getElementById("formInstituicao");
  form.reset();

  document.getElementById("tituloForm").textContent = "Cadastrar Instituição";
}

/* =========================
   EXCLUIR
========================= */
async function excluirInstituicao(id) {
  const token = getToken();

  try {
    const res = await fetch(`${API_URL}/instituicoes/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao excluir ❌");
      return;
    }

    alert("Excluído com sucesso ✅");
    carregarInstituicoes();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
}

/* =========================
   BUSCA
========================= */
document.getElementById("pesquisaInstituicoes").addEventListener("input", async (e) => {

  const termo = e.target.value.toLowerCase().trim();

  try {
    const res = await fetch(`${API_URL}/instituicoes`);

    if (!res.ok) throw new Error("Erro na busca");

    const data = await res.json();

    const filtradas = data.filter(i =>
      (i.nomeInstituicao || "").toLowerCase().includes(termo) ||
      (i.endereco || "").toLowerCase().includes(termo)
    );

    const lista = document.getElementById("listaInstituicoes");
    lista.innerHTML = "";

    if (!filtradas.length) {
      lista.innerHTML = "<li>Nenhuma instituição encontrada 🔎</li>";
      return;
    }

    filtradas.forEach(i => renderInstituicao(i, lista));

  } catch (err) {
    console.error(err);
    alert("Erro ao buscar instituições ❌");
  }
});

</script>

</body>
</html>
