<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Famílias - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Gerenciar Famílias</h1>

  <nav>
    <a href="perfil.html">Perfil</a>
    <button onclick="logout()">Sair</button>

    <input type="text" id="pesquisaFamilias" placeholder="Buscar famílias...">
  </nav>
</header>

<main>

  <!-- FORMULÁRIO -->
  <section>
    <h2 id="tituloForm">Cadastrar Família</h2>

    <form id="formFamilia">
      <input type="text" name="nomeFamilia" placeholder="Nome da Família" required>
      <input type="text" name="endereco" placeholder="Endereço" required>
      <input type="number" name="membros" placeholder="Número de Membros" required>

      <button type="submit">Salvar</button>
      <button type="button" onclick="cancelarEdicao()">Cancelar</button>
    </form>
  </section>

  <!-- LISTA -->
  <section>
    <button onclick="carregarFamilias()">Ver Famílias</button>
    <ul id="listaFamilias"></ul>
  </section>

</main>

<script>

const API_URL = "https://plataformasolidaria.onrender.com";

/* =========================
   AUTH
========================= */
function logout() {
  localStorage.removeItem("usuarioLogado");
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

/* =========================
   ESTADO
========================= */
let editandoId = null;

/* =========================
   TOKEN
========================= */
function getToken() {
  const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
  return usuario?.token;
}

/* =========================
   LISTAR
========================= */
async function carregarFamilias() {
  try {
    const res = await fetch(`${API_URL}/familias`);

    if (!res.ok) throw new Error("Erro ao carregar famílias");

    const data = await res.json();

    const lista = document.getElementById("listaFamilias");
    lista.innerHTML = "";

    if (!data.length) {
      lista.innerHTML = "<li>Nenhuma família cadastrada</li>";
      return;
    }

    data.forEach(f => renderFamilia(f, lista));

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar famílias ❌");
  }
}

/* =========================
   RENDER
========================= */
function renderFamilia(f, lista) {
  const li = document.createElement("li");

  li.textContent = `${f.nomeFamilia} | ${f.endereco} | ${f.membros} membros`;

  const btnEditar = document.createElement("button");
  btnEditar.textContent = "Editar";
  btnEditar.onclick = () => editarFamilia(f);

  const btnExcluir = document.createElement("button");
  btnExcluir.textContent = "Excluir";
  btnExcluir.onclick = () => excluirFamilia(f._id);

  li.appendChild(btnEditar);
  li.appendChild(btnExcluir);

  lista.appendChild(li);
}

/* =========================
   CREATE / UPDATE
========================= */
document.getElementById("formFamilia").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const token = getToken();

  const dados = {
    nomeFamilia: form.elements["nomeFamilia"].value,
    endereco: form.elements["endereco"].value,
    membros: form.elements["membros"].value
  };

  try {

    let url = `${API_URL}/familias`;
    let method = "POST";

    if (editandoId) {
      url = `${API_URL}/familias/${editandoId}`;
      method = "PUT";
    }

    const res = await fetch(url, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify(dados)
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao salvar ❌");
      return;
    }

    alert(editandoId ? "Atualizado com sucesso ✅" : "Cadastrado com sucesso ✅");

    form.reset();
    editandoId = null;
    document.getElementById("tituloForm").textContent = "Cadastrar Família";

    carregarFamilias();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
});

/* =========================
   EDITAR
========================= */
function editarFamilia(f) {
  editandoId = f._id;

  const form = document.getElementById("formFamilia");
  document.getElementById("tituloForm").textContent = "Editar Família";

  form.elements["nomeFamilia"].value = f.nomeFamilia || "";
  form.elements["endereco"].value = f.endereco || "";
  form.elements["membros"].value = f.membros || "";
}

/* =========================
   CANCELAR
========================= */
function cancelarEdicao() {
  editandoId = null;

  const form = document.getElementById("formFamilia");
  form.reset();

  document.getElementById("tituloForm").textContent = "Cadastrar Família";
}

/* =========================
   EXCLUIR
========================= */
async function excluirFamilia(id) {
  const token = getToken();

  try {
    const res = await fetch(`${API_URL}/familias/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.message || "Erro ao excluir ❌");
      return;
    }

    alert("Excluído com sucesso ✅");
    carregarFamilias();

  } catch (err) {
    console.error(err);
    alert("Erro de conexão");
  }
}

/* =========================
   BUSCA
========================= */
document.getElementById("pesquisaFamilias").addEventListener("input", async (e) => {

  const termo = e.target.value.toLowerCase().trim();

  try {
    const res = await fetch(`${API_URL}/familias`);

    if (!res.ok) throw new Error("Erro na busca");

    const data = await res.json();

    const filtradas = data.filter(f =>
      (f.nomeFamilia || "").toLowerCase().includes(termo) ||
      (f.endereco || "").toLowerCase().includes(termo)
    );

    const lista = document.getElementById("listaFamilias");
    lista.innerHTML = "";

    if (!filtradas.length) {
      lista.innerHTML = "<li>Nenhuma família encontrada 🔎</li>";
      return;
    }

    filtradas.forEach(f => renderFamilia(f, lista));

  } catch (err) {
    console.error(err);
    alert("Erro ao buscar famílias ❌");
  }
});

</script>

</body>
</html>
