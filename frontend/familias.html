<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Famílias - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Famílias</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Cadastrar Família</h2>
      <form id="formFamilia">
        <input type="text" name="nomeFamilia" placeholder="Nome da Família" required>
        <input type="text" name="endereco" placeholder="Endereço" required>
        <input type="number" name="membros" placeholder="Número de Membros" required>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Famílias</h2>
      <input type="text" id="pesquisaFamilias" placeholder="Pesquisar por nome ou endereço">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Famílias</h2>
      <ul id="listaFamilias"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const API_URL = "https://plataformasolidaria.onrender.com";

    function logout() {
      localStorage.removeItem("usuarioLogado");
      alert("Você saiu do sistema ✅");
      window.location.href = "login.html";
    }

    // Pesquisa simples
    document.getElementById("pesquisaFamilias")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      try {
        const res = await fetch(`${API_URL}/familias`);
        const familias = await res.json();

        const list = document.getElementById("listaFamilias");
        list.innerHTML = "";

        familias.filter(f =>
          f.nomeFamilia.toLowerCase().includes(termo) ||
          f.endereco.toLowerCase().includes(termo)
        ).forEach(f => {
          const li = document.createElement("li");
          li.textContent = `${f.nomeFamilia} | ${f.endereco} | ${f.membros} membros`;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Erro na pesquisa de famílias", err);
      }
    });

    // Carregar lista ao abrir a página
    carregarLista("listaFamilias", "familias");
  </script>
</body>
</html>
