<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Famílias - Plataforma Solidária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gerenciar Famílias</h1>
    <nav>
      <a href="perfil.html">Voltar ao Perfil</a>
    </nav>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section>
      <h2>Cadastrar Família</h2>
      <form id="formFamilia">
        <input type="text" name="nomeFamilia" placeholder="Nome da Família" required>
        <input type="text" name="endereco" placeholder="Endereço" required>
        <input type="number" name="membros" placeholder="Número de Membros" required>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <!-- Pesquisa -->
    <section>
      <h2>Pesquisar Famílias</h2>
      <input type="text" id="pesquisaFamilias" placeholder="Pesquisar por nome ou endereço">
    </section>

    <!-- Lista -->
    <section>
      <h2>Lista de Famílias</h2>
      <ul id="listaFamilias"></ul>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    // Carregar lista ao abrir a página
    if (window.location.pathname.includes("familias.html")) {
      carregarLista("listaFamilias", "familias");
    }

    // Pesquisa simples
    document.getElementById("pesquisaFamilias")?.addEventListener("input", async e => {
      const termo = e.target.value.toLowerCase();
      const list = document.getElementById("listaFamilias");
      list.innerHTML = "";
      try {
        const res = await fetch(`${API_URL}/familias`);
        const familias = await res.json();
        familias.filter(f =>
          f.nomeFamilia.toLowerCase().includes(termo) ||
          f.endereco.toLowerCase().includes(termo)
        ).forEach(f => {
          const li = document.createElement("li");
          li.textContent = `${f.nomeFamilia} | ${f.endereco} | ${f.membros}`;

          // Botões de editar/excluir
          const btnEditar = document.createElement("button");
          btnEditar.textContent = "Editar";
          btnEditar.onclick = () => editarRegistro("familias", f._id);

          const btnExcluir = document.createElement("button");
          btnExcluir.textContent = "Excluir";
          btnExcluir.onclick = () => excluirRegistro("familias", f._id, li);

          li.appendChild(btnEditar);
          li.appendChild(btnExcluir);
          list.appendChild(li);
        });
      } catch (err) {
        console.error("Erro ao pesquisar famílias", err);
      }
    });
  </script>
</body>
</html>
